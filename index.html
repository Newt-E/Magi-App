<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAGI — Sistem Pemesanan Makanan Modern</title>
  <meta name="description" content="MAGI adalah sistem pemesanan makanan modern untuk pelanggan dan pegawai. Pesan makanan dengan mudah melalui smartphone atau kelola pesanan dari dashboard." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            magi: {
              50: '#f0f4ff',
              100: '#dbe4ff',
              200: '#bac8ff',
              300: '#91a7ff',
              400: '#748ffc',
              500: '#5c7cfa',
              600: '#4c6ef5',
              700: '#4263eb',
              800: '#3b5bdb',
              900: '#364fc7',
              950: '#1e3a8a',
            },
            accent: {
              DEFAULT: '#f59e0b',
              light: '#fbbf24',
              dark: '#d97706',
            },
            surface: {
              50: '#f8fafc',
              100: '#f1f5f9',
              200: '#e2e8f0',
              700: '#334155',
              800: '#1e293b',
              900: '#0f172a',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
          animation: {
            'fade-in': 'fadeIn 0.4s ease-out',
            'slide-up': 'slideUp 0.4s ease-out',
            'slide-down': 'slideDown 0.3s ease-out',
            'scale-in': 'scaleIn 0.3s ease-out',
            'bounce-subtle': 'bounceSubtle 0.5s ease-out',
            'pulse-soft': 'pulseSoft 2s infinite',
            'shimmer': 'shimmer 2s infinite',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(24px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            slideDown: { '0%': { opacity: '0', transform: 'translateY(-16px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            scaleIn: { '0%': { opacity: '0', transform: 'scale(0.9)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
            bounceSubtle: { '0%': { transform: 'scale(1)' }, '50%': { transform: 'scale(1.08)' }, '100%': { transform: 'scale(1)' } },
            pulseSoft: { '0%, 100%': { opacity: '1' }, '50%': { opacity: '0.7' } },
            shimmer: { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } },
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #4c6ef5; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #5c7cfa; }
    /* Glass effect */
    .glass {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .glass-light {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    /* Gradient text */
    .gradient-text {
      background: linear-gradient(135deg, #748ffc, #f59e0b, #748ffc);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
    }
    /* Button hover glow */
    .btn-glow:hover {
      box-shadow: 0 0 24px rgba(76, 110, 245, 0.4);
    }
    .btn-glow-accent:hover {
      box-shadow: 0 0 24px rgba(245, 158, 11, 0.4);
    }
    /* Floating particles background */
    .bg-particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-particles::before,
    .bg-particles::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
    }
    .bg-particles::before {
      background: #4c6ef5;
      top: -100px;
      right: -100px;
      animation: float1 12s ease-in-out infinite;
    }
    .bg-particles::after {
      background: #f59e0b;
      bottom: -100px;
      left: -100px;
      animation: float2 15s ease-in-out infinite;
    }
    @keyframes float1 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-60px, 80px); }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(60px, -60px); }
    }
    /* Badge pulse */
    .badge-pulse {
      animation: pulseSoft 2s infinite;
    }
    /* Sidebar active link */
    .sidebar-link.active {
      background: linear-gradient(135deg, rgba(76, 110, 245, 0.2), rgba(76, 110, 245, 0.1));
      border-left: 3px solid #4c6ef5;
      color: #748ffc;
    }
    /* Modal overlay */
    .modal-overlay {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
    }
    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 500;
      font-size: 0.875rem;
      animation: slideUp 0.3s ease-out, fadeOut 0.3s ease-in 2.5s forwards;
    }
    @keyframes fadeOut {
      to { opacity: 0; transform: translateX(-50%) translateY(10px); }
    }
    /* Prevent body scroll when modal open */
    body.modal-open { overflow: hidden; }
    /* Table row hover */
    .table-row-hover:hover {
      background: rgba(76, 110, 245, 0.05);
    }
    /* Menu card image */
    .menu-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 12px 12px 0 0;
    }
    /* Status badges */
    .status-waiting { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
    .status-ready { background: rgba(52, 211, 153, 0.15); color: #34d399; }
    .status-done { background: rgba(148, 163, 184, 0.15); color: #94a3b8; }
  </style>
</head>
<body>
  <div class="bg-particles"></div>
  <div id="app" class="relative z-10 min-h-screen"></div>

  <script>
    // ============================================================
    // MAGI — Sistem Pemesanan Makanan Modern
    // Single Page Application - Frontend Prototype
    //
    // NOTE: GitHub Pages hanya hosting statis.
    // Data pesanan dari HP pelanggan TIDAK akan otomatis
    // tersinkron ke laptop pegawai tanpa backend/database.
    // Untuk sinkronisasi lintas perangkat, diperlukan:
    // - Supabase
    // - Firebase
    // - atau API backend sendiri
    // ============================================================

    // ============================================================
    // 1. DUMMY DATA
    // ============================================================

    const TABLES_DATA = [
      { id: 1, number: 1, capacity: 2, status: 'Tersedia' },
      { id: 2, number: 2, capacity: 2, status: 'Tersedia' },
      { id: 3, number: 3, capacity: 4, status: 'Tersedia' },
      { id: 4, number: 4, capacity: 4, status: 'Tersedia' },
      { id: 5, number: 5, capacity: 4, status: 'Tersedia' },
      { id: 6, number: 6, capacity: 6, status: 'Tersedia' },
      { id: 7, number: 7, capacity: 6, status: 'Tersedia' },
      { id: 8, number: 8, capacity: 8, status: 'Tersedia' },
      { id: 9, number: 9, capacity: 8, status: 'Tersedia' },
      { id: 10, number: 10, capacity: 10, status: 'Tersedia' },
    ];

    const MENU_DATA = [
      {
        id: 1,
        name: 'Nasi Goreng Spesial',
        category: 'Makanan',
        description: 'Nasi goreng dengan telur, ayam, dan sayuran segar pilihan chef.',
        price: 35000,
        image: 'https://images.unsplash.com/photo-1512058564366-18510be2db19?w=400&h=300&fit=crop'
      },
      {
        id: 2,
        name: 'Ayam Geprek Sambal Matah',
        category: 'Makanan',
        description: 'Ayam goreng tepung crispy dengan sambal matah khas Bali yang segar.',
        price: 32000,
        image: 'https://images.unsplash.com/photo-1632778149955-e80f8ceca2e8?w=400&h=300&fit=crop'
      },
      {
        id: 3,
        name: 'Mie Goreng Seafood',
        category: 'Makanan',
        description: 'Mie goreng dengan udang, cumi, dan sayuran dalam bumbu special.',
        price: 38000,
        image: 'https://images.unsplash.com/photo-1585032226651-759b368d7246?w=400&h=300&fit=crop'
      },
      {
        id: 4,
        name: 'Es Teh Manis',
        category: 'Minuman',
        description: 'Teh manis dingin klasik yang menyegarkan dengan es batu.',
        price: 8000,
        image: 'https://images.unsplash.com/photo-1556679343-c7306c1976bc?w=400&h=300&fit=crop'
      },
      {
        id: 5,
        name: 'Jus Mangga Segar',
        category: 'Minuman',
        description: 'Jus mangga asli tanpa tambahan air dan gula berlebih.',
        price: 18000,
        image: 'https://images.unsplash.com/photo-1546173159-315724a31696?w=400&h=300&fit=crop'
      },
      {
        id: 6,
        name: 'Kopi Susu Aren',
        category: 'Minuman',
        description: 'Espresso shot dengan susu segar dan gula aren asli pilihan.',
        price: 22000,
        image: 'https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=400&h=300&fit=crop'
      },
      {
        id: 7,
        name: 'Pancake Coklat',
        category: 'Dessert',
        description: 'Pancake fluffy berlapis saus coklat premium dan whipped cream.',
        price: 28000,
        image: 'https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445?w=400&h=300&fit=crop'
      },
      {
        id: 8,
        name: 'Es Krim Tiga Rasa',
        category: 'Dessert',
        description: 'Tiga scoop es krim: vanilla, coklat, dan strawberry premium.',
        price: 25000,
        image: 'https://images.unsplash.com/photo-1497034825429-c343d7c6a68f?w=400&h=300&fit=crop'
      },
    ];

    // ============================================================
    // 2. GLOBAL STATE
    // ============================================================

    const APP_URL = 'https://newt-e.github.io/Magi-App/';

    let state = {
      currentView: 'access-select',
      selectedAccess: null,       // 'customer' | 'staff'
      selectedRole: null,         // 'Admin' | 'Dapur' | 'Waiter'
      staffName: '',
      selectedTable: null,        // table number
      cart: [],                   // [{menuItem, quantity}]
      customerNote: '',
      orders: [],
      selectedPaymentMethod: null,
      splitBillEnabled: false,
      splitParticipants: [],
      splitCount: 2,
      menuFilter: 'Semua',
      adminSidebarView: 'dashboard', // 'dashboard' | 'tables' | 'orders' | 'qr'
      lastOrderInfo: null,
    };

    // ============================================================
    // 3. LOCALSTORAGE FUNCTIONS
    // ============================================================

    // Sinkronisasi lintas perangkat membutuhkan backend/database.
    // localStorage hanya menyimpan data di perangkat yang sama.

    function saveState() {
      try {
        const toSave = {
          orders: state.orders,
          cart: state.cart,
          selectedTable: state.selectedTable,
          customerNote: state.customerNote,
        };
        localStorage.setItem('magi_state', JSON.stringify(toSave));
      } catch (e) {
        console.warn('LocalStorage save failed:', e);
      }
    }

    function loadState() {
      try {
        const saved = localStorage.getItem('magi_state');
        if (saved) {
          const parsed = JSON.parse(saved);
          if (parsed.orders) state.orders = parsed.orders;
          if (parsed.cart) state.cart = parsed.cart;
          if (parsed.selectedTable) state.selectedTable = parsed.selectedTable;
          if (parsed.customerNote) state.customerNote = parsed.customerNote;
        }
      } catch (e) {
        console.warn('LocalStorage load failed:', e);
      }
    }

    // ============================================================
    // 4. HELPER FUNCTIONS
    // ============================================================

    function formatRupiah(num) {
      return 'Rp ' + num.toLocaleString('id-ID');
    }

    function generateOrderCode() {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      let code = 'MGI-';
      for (let i = 0; i < 6; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
      return code;
    }

    function getCartTotal() {
      return state.cart.reduce((sum, item) => sum + (item.menuItem.price * item.quantity), 0);
    }

    function getCartItemCount() {
      return state.cart.reduce((sum, item) => sum + item.quantity, 0);
    }

    function addToCart(menuItem) {
      const existing = state.cart.find(c => c.menuItem.id === menuItem.id);
      if (existing) {
        existing.quantity++;
      } else {
        state.cart.push({ menuItem, quantity: 1 });
      }
      saveState();
      render();
    }

    function updateCartQuantity(menuId, delta) {
      const item = state.cart.find(c => c.menuItem.id === menuId);
      if (!item) return;
      item.quantity += delta;
      if (item.quantity <= 0) {
        state.cart = state.cart.filter(c => c.menuItem.id !== menuId);
      }
      saveState();
      render();
    }

    function showToast(message, type = 'success') {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      const colors = {
        success: 'bg-emerald-600/90 text-white',
        error: 'bg-red-500/90 text-white',
        info: 'bg-magi-600/90 text-white',
      };
      const toast = document.createElement('div');
      toast.className = `toast ${colors[type] || colors.info}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function navigate(view) {
      state.currentView = view;
      render();
      window.scrollTo(0, 0);
    }

    function getOrdersByStatus(status) {
      return state.orders.filter(o => o.orderStatus === status);
    }

    // ============================================================
    // 5. RENDER FUNCTIONS
    // ============================================================

    function render() {
      const app = document.getElementById('app');
      switch (state.currentView) {
        case 'access-select':       app.innerHTML = renderAccessSelect(); break;
        case 'customer-table-select': app.innerHTML = renderTableSelect(); break;
        case 'customer-menu':       app.innerHTML = renderCustomerMenu(); break;
        case 'customer-cart':       app.innerHTML = renderCustomerCart(); break;
        case 'customer-checkout':   app.innerHTML = renderCustomerCheckout(); break;
        case 'customer-success':    app.innerHTML = renderCustomerSuccess(); break;
        case 'staff-login':         app.innerHTML = renderStaffLogin(); break;
        case 'admin-dashboard':     app.innerHTML = renderAdminDashboard(); break;
        case 'kitchen-dashboard':   app.innerHTML = renderKitchenDashboard(); break;
        case 'waiter-dashboard':    app.innerHTML = renderWaiterDashboard(); break;
        default:                    app.innerHTML = renderAccessSelect(); break;
      }
      attachEventListeners();
    }

    // ----- ACCESS SELECT -----
    function renderAccessSelect() {
      return `
        <div class="min-h-screen flex items-center justify-center p-4 animate-fade-in">
          <div class="text-center max-w-lg w-full">
            <!-- Logo / Brand -->
            <div class="mb-8">
              <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-magi-500 to-magi-700 shadow-lg shadow-magi-500/30 mb-6 animate-bounce-subtle">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
              </div>
              <h1 class="text-5xl sm:text-6xl font-black gradient-text tracking-tight mb-3">MAGI</h1>
              <p class="text-surface-200 text-base sm:text-lg font-light leading-relaxed">
                Sistem pemesanan makanan modern<br class="hidden sm:block"/> untuk pelanggan dan pegawai.
              </p>
            </div>

            <!-- Question -->
            <div class="mb-8 animate-slide-up" style="animation-delay: 0.15s">
              <p class="text-xl font-semibold text-white/90">Kamu masuk sebagai apa?</p>
            </div>

            <!-- Buttons -->
            <div class="flex flex-col sm:flex-row gap-4 justify-center animate-slide-up" style="animation-delay: 0.3s">
              <button id="btn-customer" class="group flex-1 max-w-xs mx-auto sm:mx-0 glass rounded-2xl p-6 hover:bg-magi-600/20 transition-all duration-300 btn-glow cursor-pointer border border-white/10 hover:border-magi-400/40">
                <div class="flex flex-col items-center gap-3">
                  <div class="w-14 h-14 rounded-xl bg-gradient-to-br from-amber-400 to-orange-500 flex items-center justify-center shadow-lg group-hover:scale-110 transition-transform">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                  </div>
                  <div>
                    <p class="text-lg font-bold text-white">Pelanggan</p>
                    <p class="text-sm text-surface-200 mt-1">Pesan makanan & minuman</p>
                  </div>
                </div>
              </button>

              <button id="btn-staff" class="group flex-1 max-w-xs mx-auto sm:mx-0 glass rounded-2xl p-6 hover:bg-magi-600/20 transition-all duration-300 btn-glow cursor-pointer border border-white/10 hover:border-magi-400/40">
                <div class="flex flex-col items-center gap-3">
                  <div class="w-14 h-14 rounded-xl bg-gradient-to-br from-magi-400 to-magi-700 flex items-center justify-center shadow-lg group-hover:scale-110 transition-transform">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                    </svg>
                  </div>
                  <div>
                    <p class="text-lg font-bold text-white">Pegawai</p>
                    <p class="text-sm text-surface-200 mt-1">Kelola pesanan & operasional</p>
                  </div>
                </div>
              </button>
            </div>

            <p class="text-xs text-surface-200/50 mt-12 animate-fade-in" style="animation-delay: 0.6s">© 2026 MAGI — Powered by Modern Technology</p>
          </div>
        </div>
      `;
    }

    // ----- TABLE SELECT -----
    function renderTableSelect() {
      const tableCards = TABLES_DATA.map(t => {
        const isSelected = state.selectedTable === t.number;
        const selectedClass = isSelected
          ? 'border-magi-400 bg-magi-600/20 ring-2 ring-magi-400/50 shadow-lg shadow-magi-500/20'
          : 'border-white/10 hover:border-magi-400/30 hover:bg-white/5';
        return `
          <button class="table-select-btn glass rounded-2xl p-4 text-center transition-all duration-300 cursor-pointer border ${selectedClass}" data-table="${t.number}">
            <div class="text-3xl font-black text-white mb-1">${t.number}</div>
            <div class="text-xs text-surface-200 mb-2">
              <svg class="w-3.5 h-3.5 inline mr-1 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              ${t.capacity} orang
            </div>
            <span class="inline-block px-2 py-0.5 rounded-full text-xs font-medium ${t.status === 'Tersedia' ? 'bg-emerald-500/15 text-emerald-400' : 'bg-red-500/15 text-red-400'}">
              ${t.status}
            </span>
            ${isSelected ? '<div class="mt-2"><svg class="w-5 h-5 text-magi-400 mx-auto" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg></div>' : ''}
          </button>
        `;
      }).join('');

      return `
        <div class="min-h-screen max-w-2xl mx-auto p-4 pb-24 animate-fade-in">
          <!-- Header -->
          <div class="flex items-center gap-3 mb-6">
            <button id="btn-back-access" class="w-10 h-10 rounded-xl glass flex items-center justify-center hover:bg-white/10 transition-colors">
              <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <div>
              <h1 class="text-2xl font-bold text-white">Pilih Meja</h1>
              <p class="text-sm text-surface-200">Silakan pilih nomor meja Anda sebelum memesan.</p>
            </div>
          </div>

          ${state.selectedTable ? `
            <div class="glass rounded-xl p-3 mb-4 flex items-center gap-3 animate-scale-in border border-magi-400/30">
              <div class="w-10 h-10 rounded-lg bg-magi-500/20 flex items-center justify-center">
                <svg class="w-5 h-5 text-magi-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
              </div>
              <p class="text-sm text-white font-medium">Anda memilih <span class="text-magi-300 font-bold">Meja ${state.selectedTable}</span></p>
            </div>
          ` : ''}

          <!-- Table Grid -->
          <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-6">
            ${tableCards}
          </div>

          <!-- Continue Button -->

            <p class="text-sm text-magi-300 font-medium mb-4 break-all">${APP_URL}</p>
            <div class="flex gap-2">
              <button id="btn-modal-copy-link" class="flex-1 py-2.5 rounded-xl bg-magi-500 text-white text-sm font-semibold hover:bg-magi-400 transition-colors">Copy Link</button>

            </div>
          </div>
        </div>
      `;

    function renderOrdersTable(orders) {
      const statusClass = s => s === 'Menunggu Dimasak' ? 'status-waiting' : s === 'Siap Diantar' ? 'status-ready' : 'status-done';
      const paymentLabels = { qris: 'QRIS', cash: 'Tunai', debit: 'Debit' };
      const rows = orders.map(o => `
        <tr class="table-row-hover border-b border-white/5">
          <td class="px-4 py-3 text-sm font-bold text-magi-300">${o.orderCode}</td>
          <td class="px-4 py-3 text-sm text-white">Meja ${o.tableNumber}</td>
          <td class="px-4 py-3 text-sm font-semibold text-accent-light">${formatRupiah(o.totalPrice)}</td>
          <td class="px-4 py-3 text-sm text-surface-200">${paymentLabels[o.paymentMethod] || o.paymentMethod}</td>
          <td class="px-4 py-3"><span class="px-2 py-0.5 rounded-full text-xs font-semibold ${statusClass(o.orderStatus)}">${o.orderStatus}</span></td>
          <td class="px-4 py-3 text-xs text-surface-200">${o.createdAt}</td>
        </tr>
      `).join('');
      return `
        <div class="glass rounded-2xl border border-white/5 overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead>
                <tr class="border-b border-white/10">
                  <th class="text-left px-4 py-3 text-xs font-bold text-surface-200 uppercase tracking-wider">No. Pesanan</th>
                  <th class="text-left px-4 py-3 text-xs font-bold text-surface-200 uppercase tracking-wider">Meja</th>
                  <th class="text-left px-4 py-3 text-xs font-bold text-surface-200 uppercase tracking-wider">Total</th>
                  <th class="text-left px-4 py-3 text-xs font-bold text-surface-200 uppercase tracking-wider">Pembayaran</th>
                  <th class="text-left px-4 py-3 text-xs font-bold text-surface-200 uppercase tracking-wider">Status</th>
                  <th class="text-left px-4 py-3 text-xs font-bold text-surface-200 uppercase tracking-wider">Waktu</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      `;
    }

            <span class="text-surface-200">${formatRupiah(it.price * it.quantity)}</span>

        return `
          <div class="glass rounded-2xl p-5 border border-white/5 hover:border-amber-400/20 transition-colors animate-slide-up">
            <div class="flex items-center justify-between mb-3">
              <div>
                <p class="text-xs text-surface-200">Pesanan</p>
                <p class="text-lg font-black text-magi-300">${o.orderCode}</p>

              <div class="text-right">

      return `

        <button id="btn-toggle-sidebar" class="lg:hidden fixed top-4 left-4 z-40 w-10 h-10 rounded-xl glass flex items-center justify-center hover:bg-white/10 transition-colors">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <main class="lg:ml-64 min-h-screen p-4 sm:p-6 lg:p-8 animate-fade-in">
          <div class="max-w-6xl mx-auto">

              <h2 class="text-2xl font-black text-white">Dashboard Dapur</h2>

            </div>
            ${waitingOrders.length > 0 ? `
              <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                ${orderCards}

            ` : `
              <div class="glass rounded-2xl p-16 text-center border border-white/5">
                <div class="w-20 h-20 rounded-full bg-white/5 flex items-center justify-center mx-auto mb-4">
                  <svg class="w-10 h-10 text-surface-200/30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z"/></svg>
                </div>
                <p class="text-lg font-semibold text-white/60 mb-1">Belum ada pesanan</p>

          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>

    // ============================================================
    // 6. EVENT HANDLERS
    // ============================================================

    function attachEventListeners() {
      // -- ACCESS SELECT --
      const btnCustomer = document.getElementById('btn-customer');
      if (btnCustomer) btnCustomer.addEventListener('click', () => {
        state.selectedAccess = 'customer';
        navigate('customer-table-select');
      });

      const btnStaff = document.getElementById('btn-staff');
      if (btnStaff) btnStaff.addEventListener('click', () => {
        state.selectedAccess = 'staff';
        navigate('staff-login');
      });

      // -- BACK BUTTONS --
      document.querySelectorAll('#btn-back-access, #btn-back-access-staff').forEach(btn => {
        btn.addEventListener('click', () => {
          state.selectedAccess = null;
          state.selectedRole = null;
          state.staffName = '';
          state.adminSidebarView = 'dashboard';
          navigate('access-select');
        });
      });

      const btnBackTables = document.getElementById('btn-back-tables');
      if (btnBackTables) btnBackTables.addEventListener('click', () => navigate('customer-table-select'));

      document.querySelectorAll('#btn-back-menu, #btn-back-menu-bottom').forEach(btn => {
        btn.addEventListener('click', () => {
          // Save customer note before going back
          const noteInput = document.getElementById('input-customer-note');
          if (noteInput) state.customerNote = noteInput.value;
          navigate('customer-menu');
        });
      });

      const btnBackCart = document.getElementById('btn-back-cart');
      if (btnBackCart) btnBackCart.addEventListener('click', () => navigate('customer-cart'));

      // -- TABLE SELECT --
      document.querySelectorAll('.table-select-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.selectedTable = parseInt(btn.dataset.table);
          render();
        });
      });

      const btnContinueMenu = document.getElementById('btn-continue-menu');
      if (btnContinueMenu) btnContinueMenu.addEventListener('click', () => {
        if (!state.selectedTable) {
          showToast('Silakan pilih meja terlebih dahulu.', 'error');
          return;
        }
        navigate('customer-menu');
      });

      // -- MENU --
      document.querySelectorAll('.menu-cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.menuFilter = btn.dataset.cat;
          render();
        });
      });

      document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const menu = MENU_DATA.find(m => m.id === parseInt(btn.dataset.id));
          if (menu) {
            addToCart(menu);
            showToast(`${menu.name} ditambahkan ke keranjang!`, 'success');
          }
        });
      });

      document.querySelectorAll('.cart-plus-btn').forEach(btn => {
        btn.addEventListener('click', () => updateCartQuantity(parseInt(btn.dataset.id), 1));
      });

      document.querySelectorAll('.cart-minus-btn').forEach(btn => {
        btn.addEventListener('click', () => updateCartQuantity(parseInt(btn.dataset.id), -1));
      });

      // -- GO TO CART --
      document.querySelectorAll('#btn-go-cart, #btn-go-cart-header').forEach(btn => {
        btn.addEventListener('click', () => navigate('customer-cart'));
      });

      // -- CUSTOMER NOTE INPUT --
      const noteInput = document.getElementById('input-customer-note');
      if (noteInput) {
        noteInput.addEventListener('input', (e) => {
          state.customerNote = e.target.value;
        });
      }

      // -- GO TO CHECKOUT --
      const btnGoCheckout = document.getElementById('btn-go-checkout');
      if (btnGoCheckout) btnGoCheckout.addEventListener('click', () => {
        const noteI = document.getElementById('input-customer-note');
        if (noteI) state.customerNote = noteI.value;
        navigate('customer-checkout');
      });

      // -- PAYMENT METHODS --
      document.querySelectorAll('.payment-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.selectedPaymentMethod = btn.dataset.method;
          render();
        });
      });

      // -- SPLIT BILL --
      const toggleSplit = document.getElementById('toggle-split');
      if (toggleSplit) toggleSplit.addEventListener('change', () => {
        state.splitBillEnabled = toggleSplit.checked;
        render();
      });

      const splitMinus = document.getElementById('split-minus');
      if (splitMinus) splitMinus.addEventListener('click', () => {
        if (state.splitCount > 2) { state.splitCount--; render(); }
      });

      const splitPlus = document.getElementById('split-plus');
      if (splitPlus) splitPlus.addEventListener('click', () => {
        state.splitCount++;
        render();
      });

      const btnAddParticipant = document.getElementById('btn-add-participant');
      if (btnAddParticipant) btnAddParticipant.addEventListener('click', () => {
        const input = document.getElementById('input-participant');
        if (!input || !input.value.trim()) {
          showToast('Masukkan nama peserta!', 'error');
          return;
        }
        state.splitParticipants.push({ name: input.value.trim(), status: 'Belum Bayar' });
        render();
        showToast(`${input.value.trim()} ditambahkan ke Split Bill`, 'success');
      });

      // -- Split QR Modal --
      const btnGenSplitQr = document.getElementById('btn-gen-split-qr');
      if (btnGenSplitQr) btnGenSplitQr.addEventListener('click', () => {
        const modal = document.getElementById('modal-split-qr');
        if (modal) modal.classList.remove('hidden');
      });

      const btnCloseSplitQr = document.getElementById('btn-close-split-qr');
      if (btnCloseSplitQr) btnCloseSplitQr.addEventListener('click', () => {
        const modal = document.getElementById('modal-split-qr');
        if (modal) modal.classList.add('hidden');
      });

      // -- Scan Friend QR --
      // TODO: Integrasi kamera dapat ditambahkan nanti menggunakan WebRTC
      // atau library QR scanner seperti html5-qrcode
      const btnScanFriend = document.getElementById('btn-scan-friend-qr');
      if (btnScanFriend) btnScanFriend.addEventListener('click', () => {
        const modal = document.getElementById('modal-scan-friend');
        if (modal) modal.classList.remove('hidden');
      });

      const btnCloseScanFriend = document.getElementById('btn-close-scan-friend');
      if (btnCloseScanFriend) btnCloseScanFriend.addEventListener('click', () => {
        const modal = document.getElementById('modal-scan-friend');
        if (modal) modal.classList.add('hidden');
      });

      // -- PAY NOW --
      const btnPayNow = document.getElementById('btn-pay-now');
      if (btnPayNow) btnPayNow.addEventListener('click', () => {
        if (state.cart.length === 0) {
          showToast('Keranjang kosong!', 'error');
          return;
        }
        if (!state.selectedPaymentMethod) {
          showToast('Pilih metode pembayaran terlebih dahulu.', 'error');
          return;
        }

        // Create new order
        const now = new Date();
        const timeStr = now.toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'short' });
        const order = {
          id: Date.now(),
          orderCode: generateOrderCode(),
          tableNumber: state.selectedTable,
          items: state.cart.map(c => ({
            id: c.menuItem.id,
            name: c.menuItem.name,
            price: c.menuItem.price,
            quantity: c.quantity,
          })),
          customerNote: state.customerNote,
          totalPrice: getCartTotal(),
          paymentMethod: state.selectedPaymentMethod,
          paymentStatus: 'Lunas',
          orderStatus: 'Menunggu Dimasak',
          createdAt: timeStr,
        };

        // TODO: send order to backend API
        // NOTE: GitHub Pages hanya hosting statis, sehingga data dari HP pelanggan
        // tidak otomatis tersinkron ke laptop pegawai tanpa backend/database
        // seperti Supabase, Firebase, atau API backend sendiri.

        state.orders.push(order);
        state.lastOrderInfo = order;
        state.cart = [];
        state.customerNote = '';
        state.selectedPaymentMethod = null;
        state.splitBillEnabled = false;
        state.splitParticipants = [];
        state.splitCount = 2;
        saveState();
        navigate('customer-success');
      });

      // -- ORDER AGAIN --
      const btnOrderAgain = document.getElementById('btn-order-again');
      if (btnOrderAgain) btnOrderAgain.addEventListener('click', () => {
        // Keep table, clear cart
        state.cart = [];
        state.menuFilter = 'Semua';
        navigate('customer-menu');
      });

      // -- STAFF LOGIN --
      document.querySelectorAll('.role-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.selectedRole = btn.dataset.role;
          render();
        });
      });

      const inputStaffName = document.getElementById('input-staff-name');
      if (inputStaffName) {
        inputStaffName.addEventListener('input', (e) => {
          state.staffName = e.target.value;
        });
      }

      const btnStaffLogin = document.getElementById('btn-staff-login');
      if (btnStaffLogin) btnStaffLogin.addEventListener('click', () => {
        if (!state.staffName.trim()) {
          showToast('Masukkan nama pegawai!', 'error');
          return;
        }
        if (!state.selectedRole) {
          showToast('Pilih role terlebih dahulu!', 'error');
          return;
        }
        state.adminSidebarView = 'dashboard';
        if (state.selectedRole === 'Admin') navigate('admin-dashboard');
        else if (state.selectedRole === 'Dapur') navigate('kitchen-dashboard');
        else if (state.selectedRole === 'Waiter') navigate('waiter-dashboard');
      });

      // -- STAFF SIDEBAR NAV --
      document.querySelectorAll('.sidebar-nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.adminSidebarView = btn.dataset.view;
          render();
        });
      });

      // -- STAFF LOGOUT --
      const btnLogout = document.getElementById('btn-staff-logout');
      if (btnLogout) btnLogout.addEventListener('click', () => {
        state.selectedAccess = null;
        state.selectedRole = null;
        state.staffName = '';
        state.adminSidebarView = 'dashboard';
        navigate('access-select');
      });

      // -- ADMIN QR BUTTONS --
      document.querySelectorAll('.admin-qr-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const modal = document.getElementById('modal-admin-qr');
          if (modal) modal.classList.remove('hidden');
        });
      });

      const btnModalCloseQr = document.getElementById('btn-modal-close-qr');
      if (btnModalCloseQr) btnModalCloseQr.addEventListener('click', () => {
        const modal = document.getElementById('modal-admin-qr');
        if (modal) modal.classList.add('hidden');
      });

      // -- COPY LINK --
      document.querySelectorAll('#btn-copy-qr-link, #btn-modal-copy-link').forEach(btn => {
        btn.addEventListener('click', () => {
          navigator.clipboard.writeText(APP_URL).then(() => {
            showToast('Link berhasil disalin!', 'success');
          }).catch(() => {
            // Fallback
            const ta = document.createElement('textarea');
            ta.value = APP_URL;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            ta.remove();
            showToast('Link berhasil disalin!', 'success');
          });
        });
      });

      // -- DOWNLOAD QR (admin) --
      const btnDownloadQr = document.getElementById('btn-download-qr');
      if (btnDownloadQr) btnDownloadQr.addEventListener('click', () => {
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=${encodeURIComponent(APP_URL)}`;
        window.open(qrUrl, '_blank');
      });

      // -- KITCHEN: DONE COOKING --
      document.querySelectorAll('.kitchen-done-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const orderId = parseInt(btn.dataset.orderId);
          const order = state.orders.find(o => o.id === orderId);
          if (order) {
            order.orderStatus = 'Siap Diantar';
            saveState();
            showToast(`Pesanan ${order.orderCode} siap diantar!`, 'success');
            render();
          }
        });
      });

      // -- WAITER: ORDER DONE --
      document.querySelectorAll('.waiter-done-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const orderId = parseInt(btn.dataset.orderId);
          const order = state.orders.find(o => o.id === orderId);
          if (order) {
            order.orderStatus = 'Selesai';
            saveState();
            showToast(`Pesanan ${order.orderCode} selesai!`, 'success');
            render();
          }
        });
      });

      // -- MOBILE SIDEBAR TOGGLE --
      const btnToggle = document.getElementById('btn-toggle-sidebar');
      const sidebar = document.getElementById('staff-sidebar');
      if (btnToggle && sidebar) {
        // Check initial state
        if (!sidebar.classList.contains('translate-x-0') && window.innerWidth < 1024) {
          sidebar.classList.add('-translate-x-full');
        }
        btnToggle.addEventListener('click', () => {
          sidebar.classList.toggle('-translate-x-full');
          sidebar.classList.toggle('translate-x-0');
        });
      }

      // Close modals on overlay click
      document.querySelectorAll('.modal-overlay').forEach(modal => {
        modal.addEventListener('click', (e) => {
          if (e.target === modal) modal.classList.add('hidden');
        });
      });
    }
