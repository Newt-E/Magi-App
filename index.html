<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAGI — Sistem Pemesanan Makanan Modern</title>
  <meta name="description" content="MAGI adalah sistem pemesanan makanan modern untuk pelanggan dan pegawai. Pesan makanan dengan mudah melalui smartphone atau kelola pesanan dari dashboard." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            magi: {
              50: '#f0f4ff',
              100: '#dbe4ff',
              200: '#bac8ff',
              300: '#91a7ff',
              400: '#748ffc',
              500: '#5c7cfa',
              600: '#4c6ef5',
              700: '#4263eb',
              800: '#3b5bdb',
              900: '#364fc7',
              950: '#1e3a8a',
            },
            accent: {
              DEFAULT: '#f59e0b',
              light: '#fbbf24',
              dark: '#d97706',
            },
            surface: {
              50: '#f8fafc',
              100: '#f1f5f9',
              200: '#e2e8f0',
              700: '#334155',
              800: '#1e293b',
              900: '#0f172a',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
          animation: {
            'fade-in': 'fadeIn 0.4s ease-out',
            'slide-up': 'slideUp 0.4s ease-out',
            'slide-down': 'slideDown 0.3s ease-out',
            'scale-in': 'scaleIn 0.3s ease-out',
            'bounce-subtle': 'bounceSubtle 0.5s ease-out',
            'pulse-soft': 'pulseSoft 2s infinite',
            'shimmer': 'shimmer 2s infinite',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(24px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            slideDown: { '0%': { opacity: '0', transform: 'translateY(-16px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            scaleIn: { '0%': { opacity: '0', transform: 'scale(0.9)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
            bounceSubtle: { '0%': { transform: 'scale(1)' }, '50%': { transform: 'scale(1.08)' }, '100%': { transform: 'scale(1)' } },
            pulseSoft: { '0%, 100%': { opacity: '1' }, '50%': { opacity: '0.7' } },
            shimmer: { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } },
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #4c6ef5; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #5c7cfa; }
    /* Glass effect */
    .glass {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .glass-light {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    /* Gradient text */
    .gradient-text {
      background: linear-gradient(135deg, #748ffc, #f59e0b, #748ffc);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
    }
    /* Button hover glow */
    .btn-glow:hover {
      box-shadow: 0 0 24px rgba(76, 110, 245, 0.4);
    }
    .btn-glow-accent:hover {
      box-shadow: 0 0 24px rgba(245, 158, 11, 0.4);
    }
    /* Floating particles background */
    .bg-particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-particles::before,
    .bg-particles::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
    }
    .bg-particles::before {
      background: #4c6ef5;
      top: -100px;
      right: -100px;
      animation: float1 12s ease-in-out infinite;
    }
    .bg-particles::after {
      background: #f59e0b;
      bottom: -100px;
      left: -100px;
      animation: float2 15s ease-in-out infinite;
    }
    @keyframes float1 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-60px, 80px); }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(60px, -60px); }
    }
    /* Badge pulse */
    .badge-pulse {
      animation: pulseSoft 2s infinite;
    }
    /* Sidebar active link */
    .sidebar-link.active {
      background: linear-gradient(135deg, rgba(76, 110, 245, 0.2), rgba(76, 110, 245, 0.1));
      border-left: 3px solid #4c6ef5;
      color: #748ffc;
    }
    /* Modal overlay */
    .modal-overlay {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
    }
    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 500;
      font-size: 0.875rem;
      animation: slideUp 0.3s ease-out, fadeOut 0.3s ease-in 2.5s forwards;
    }
    @keyframes fadeOut {
      to { opacity: 0; transform: translateX(-50%) translateY(10px); }
    }
    /* Prevent body scroll when modal open */
    body.modal-open { overflow: hidden; }
    /* Table row hover */
    .table-row-hover:hover {
      background: rgba(76, 110, 245, 0.05);
    }
    /* Menu card image */
    .menu-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 12px 12px 0 0;
    }
    /* Status badges */
    .status-waiting { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
    .status-ready { background: rgba(52, 211, 153, 0.15); color: #34d399; }
    .status-done { background: rgba(148, 163, 184, 0.15); color: #94a3b8; }
    .status-cancelled { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
    /* Loading spinner */
    .spinner {
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #748ffc;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="bg-particles"></div>
  <div id="app" class="relative z-10 min-h-screen"></div>

  <script>
    // ============================================================
    // MAGI — Sistem Pemesanan Makanan Modern
    // Single Page Application with Supabase Backend
    //
    // Frontend: GitHub Pages (static hosting)
    // Backend: Supabase Free Plan (PostgreSQL + Auth + Realtime)
    //
    // Data pesanan tersinkron secara realtime antar perangkat
    // melalui Supabase Realtime subscriptions.
    // ============================================================

    // ============================================================
    // 1. SUPABASE CLIENT CONFIGURATION
    // ============================================================
    //
    // CATATAN KEAMANAN:
    // - anon key boleh diekspos di frontend karena RLS policy yang
    //   mengontrol akses data.
    // - anon key = public key, bukan secret key.
    // - Jangan pernah meletakkan service_role key di frontend.
    // ============================================================

    const SUPABASE_URL = "https://nhaekdnvliytsvayfeqn.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oYWVrZG52bGl5dHN2YXlmZXFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NTU2NjYsImV4cCI6MjA5NjAzMTY2Nn0.fuUcC0OsdfGj3AYdwzEvADDK_7q7jRHmTZChrNDA4cc";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ============================================================
    // 2. CONSTANTS & LABEL MAPPINGS
    // ============================================================

    const APP_URL = 'https://newt-e.github.io/Magi-App/';

    // Database status values (snake_case) → Display labels
    const STATUS_LABELS = {
      menunggu_verifikasi_pembayaran: 'Menunggu Verifikasi Pembayaran',
      menunggu_dimasak: 'Menunggu Dimasak',
      siap_diantar: 'Siap Diantar',
      selesai: 'Selesai',
      dibatalkan: 'Dibatalkan',
    };

    // Database payment method values → Display labels
    const PAYMENT_LABELS = {
      qris: 'QRIS',
      tunai: 'Tunai',
      kartu_debit: 'Kartu Debit',
    };

    // Database payment status values → Display labels
    const PAYMENT_STATUS_LABELS = {
      belum_dibayar: 'Belum Dibayar',
      menunggu_verifikasi: 'Menunggu Verifikasi',
      dummy_paid: 'Lunas (Demo)',
      paid: 'Lunas',
      failed: 'Gagal/Ditolak',
    };

    const SPLIT_PAYMENT_STATUS_LABELS = {
      belum_bayar: 'Belum Bayar',
      menunggu_verifikasi: 'Menunggu Verifikasi',
      terverifikasi: 'Terverifikasi',
      ditolak: 'Ditolak'
    };

    // Frontend payment method IDs → Database values
    const PAYMENT_METHOD_MAP = {
      qris: 'qris',
      cash: 'tunai',
      debit: 'kartu_debit',
    };

    // ============================================================
    // 3. DATA (loaded from Supabase)
    // ============================================================

    let tablesData = [];
    let menuData = [];

    // ============================================================
    // 4. GLOBAL STATE
    // ============================================================

    let state = {
      currentView: 'access-select',
      selectedAccess: null,       // 'customer' | 'staff'
      selectedRole: null,         // 'admin' | 'dapur' | 'waiter'
      staffName: '',
      staffSession: null,         // Supabase auth session
      selectedTable: null,        // table number
      cart: [],                   // [{menuItem, quantity}]
      customerNote: '',
      orders: [],                 // orders from Supabase
      selectedPaymentMethod: null,
      splitBillEnabled: false,
      splitParticipants: [],
      splitCount: 2,
      menuFilter: 'Semua',
      adminSidebarView: 'dashboard',
      lastOrderInfo: null,
      isLoading: false,
      loginError: '',
    };

    // Active Supabase Realtime channel reference
    let ordersChannel = null;

    // ============================================================
    // 5. LOCALSTORAGE FUNCTIONS (only for client-side state)
    // ============================================================

    function saveLocalState() {
      try {
        const toSave = {
          cart: state.cart,
          selectedTable: state.selectedTable,
          customerNote: state.customerNote,
          lastOrderInfo: state.lastOrderInfo,
          currentView: state.currentView && state.currentView.startsWith('customer') ? state.currentView : 'access-select'
        };
        localStorage.setItem('magi_state', JSON.stringify(toSave));
      } catch (e) {
        console.warn('LocalStorage save failed:', e);
      }
    }

    function loadLocalState() {
      try {
        const saved = localStorage.getItem('magi_state');
        if (saved) {
          const parsed = JSON.parse(saved);
          if (parsed.cart) state.cart = parsed.cart;
          if (parsed.selectedTable) state.selectedTable = parsed.selectedTable;
          if (parsed.customerNote) state.customerNote = parsed.customerNote;
          if (parsed.lastOrderInfo) state.lastOrderInfo = parsed.lastOrderInfo;
          if (parsed.currentView) state.currentView = parsed.currentView;
        }
      } catch (e) {
        console.warn('LocalStorage load failed:', e);
      }
    }

    // ============================================================
    // 6. HELPER FUNCTIONS
    // ============================================================

    function formatRupiah(num) {
      return 'Rp ' + num.toLocaleString('id-ID');
    }

    function generateOrderCode() {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      let code = 'MGI-';
      for (let i = 0; i < 6; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
      return code;
    }

    function getCartSubtotal() {
      return state.cart.reduce((sum, item) => sum + (item.menuItem.price * item.quantity), 0);
    }

    function getPointsDiscount() {
      if (!state.usePoints || !state.memberProfile) return 0;
      const subtotal = getCartSubtotal();
      const maxDiscount = state.memberProfile.points * 10;
      return Math.min(subtotal, maxDiscount);
    }

    function getUsedPoints() {
      if (!state.usePoints || !state.memberProfile) return 0;
      const subtotal = getCartSubtotal();
      if (state.memberProfile.points * 10 > subtotal) {
        return Math.ceil(subtotal / 10);
      }
      return state.memberProfile.points;
    }

    function getCartTotal() {
      return getCartSubtotal() - getPointsDiscount();
    }

    function getSplitAmount() {
      const total = getCartTotal();
      if (!state.splitBillEnabled || state.splitCount < 2) return total;
      return Math.ceil(total / state.splitCount);
    }

    function getPayableAmount() {
      if (state.splitBillEnabled) return getSplitAmount();
      return getCartTotal();
    }

    function getCartItemCount() {
      return state.cart.reduce((sum, item) => sum + item.quantity, 0);
    }

    function addToCart(menuItem) {
      const existing = state.cart.find(c => c.menuItem.id === menuItem.id);
      if (existing) {
        existing.quantity++;
      } else {
        state.cart.push({ menuItem, quantity: 1 });
      }
      saveLocalState();
      render();
    }

    function updateCartQuantity(menuId, delta) {
      const item = state.cart.find(c => c.menuItem.id === menuId);
      if (!item) return;
      item.quantity += delta;
      if (item.quantity <= 0) {
        state.cart = state.cart.filter(c => c.menuItem.id !== menuId);
      }
      saveLocalState();
      render();
    }

    function showToast(message, type = 'success') {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      const colors = {
        success: 'bg-emerald-600/90 text-white',
        error: 'bg-red-500/90 text-white',
        info: 'bg-magi-600/90 text-white',
      };
      const toast = document.createElement('div');
      toast.className = `toast ${colors[type] || colors.info}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function navigate(view) {
      state.currentView = view;
      render();
      window.scrollTo(0, 0);
    }

    function getStatusLabel(dbStatus) {
      return STATUS_LABELS[dbStatus] || dbStatus;
    }

    function getStatusClass(dbStatus) {
      if (dbStatus === 'menunggu_dimasak') return 'status-waiting';
      if (dbStatus === 'siap_diantar') return 'status-ready';
      if (dbStatus === 'selesai') return 'status-done';
      if (dbStatus === 'dibatalkan') return 'status-cancelled';
      return '';
    }

    function getPaymentLabel(dbMethod) {
      return PAYMENT_LABELS[dbMethod] || dbMethod;
    }

    function renderLoadingSpinner(message = 'Memuat...') {
      return `
        <div class="flex flex-col items-center justify-center py-20">
          <div class="spinner mb-4"></div>
          <p class="text-surface-200 text-sm">${message}</p>
        </div>
      `;
    }

    // ============================================================
    // 7. SUPABASE INTEGRATION FUNCTIONS
    // ============================================================

    // --- 7.1 Fetch Tables ---
    async function fetchTables() {
      const { data, error } = await supabaseClient
        .from('restaurant_tables')
        .select('*')
        .order('table_number', { ascending: true });

      if (error) {
        console.error('Error fetching tables:', error);
        showToast('Gagal memuat data meja.', 'error');
        return [];
      }
      return data || [];
    }

    // --- 7.2 Fetch Menu Items ---
    async function fetchMenuItems() {
      const { data, error } = await supabaseClient
        .from('menu_items')
        .select('*')
        .eq('is_available', true)
        .order('category', { ascending: true });

      if (error) {
        console.error('Error fetching menu:', error);
        showToast('Gagal memuat data menu.', 'error');
        return [];
      }
      return data || [];
    }

    // --- 7.3 Create Order ---
    async function createOrder(orderData, cartItems) {
      // Insert order
      const { data: order, error: orderError } = await supabaseClient
        .from('orders')
        .insert({
          order_code: orderData.orderCode,
          table_number: orderData.tableNumber,
          customer_note: orderData.customerNote || null,
          total_price: orderData.totalPrice,
          payment_method: orderData.paymentMethod,
          payment_status: orderData.paymentStatus || 'dummy_paid',
          order_status: orderData.orderStatus || 'menunggu_dimasak',
          payment_amount: orderData.paymentAmount || null,
          is_split_bill: orderData.isSplitBill || false,
          split_amount: orderData.splitAmount || 0,
          member_id: orderData.memberId || null,
          points_used: orderData.pointsUsed || 0,
          points_earned: orderData.pointsEarned || 0,
        })
        .select()
        .single();

      if (orderError) {
        console.error('Error creating order:', orderError);
        showToast('Gagal membuat pesanan. Silakan coba lagi.', 'error');
        return null;
      }

      // Insert order items
      const orderItems = cartItems.map(item => ({
        order_id: order.id,
        menu_item_id: item.menuItem.id,
        menu_name: item.menuItem.name,
        quantity: item.quantity,
        price: item.menuItem.price,
        subtotal: item.menuItem.price * item.quantity,
      }));

      const { error: itemsError } = await supabaseClient
        .from('order_items')
        .insert(orderItems);

      if (itemsError) {
        console.error('Error creating order items:', itemsError);
        showToast('Pesanan dibuat tetapi detail item gagal disimpan.', 'error');
      }

      // If split bill, insert participants
      if (orderData.isSplitBill && orderData.splitParticipants && orderData.splitParticipants.length > 0) {
        const participantsData = orderData.splitParticipants.map(p => ({
          order_id: order.id,
          participant_name: p.name,
          amount: orderData.splitAmount,
          payment_status: p.status === 'Menunggu Verifikasi' ? 'menunggu_verifikasi' : 'belum_bayar'
        }));
        
        const { error: splitError } = await supabaseClient
          .from('split_bill_participants')
          .insert(participantsData);
          
        if (splitError) {
          console.error('Error creating split bill participants:', splitError);
        }
      }

      return order;
    }

    // --- 7.4 Fetch Kitchen Orders ---
    async function fetchKitchenOrders() {
      const { data, error } = await supabaseClient
        .from('orders')
        .select('*, order_items(*)')
        .eq('order_status', 'menunggu_dimasak')
        .in('payment_status', ['paid', 'dummy_paid', 'belum_dibayar'])
        .order('created_at', { ascending: true });

      if (error) {
        console.error('Error fetching kitchen orders:', error);
        return [];
      }
      return data || [];
    }

    // --- 7.5 Mark Order as Cooked ---
    async function markOrderAsCooked(orderId) {
      const { data, error } = await supabaseClient
        .from('orders')
        .update({
          order_status: 'siap_diantar',
          updated_at: new Date().toISOString(),
        })
        .eq('id', orderId)
        .eq('order_status', 'menunggu_dimasak')
        .select()
        .single();

      if (error) {
        console.error('Error updating order:', error);
        showToast('Gagal mengupdate status pesanan.', 'error');
        return null;
      }
      return data;
    }

    // --- 7.6 Fetch Waiter Orders ---
    async function fetchWaiterOrders() {
      const { data, error } = await supabaseClient
        .from('orders')
        .select('*, order_items(*)')
        .eq('order_status', 'siap_diantar')
        .order('created_at', { ascending: true });

      if (error) {
        console.error('Error fetching waiter orders:', error);
        return [];
      }
      return data || [];
    }

    // --- 7.7 Mark Order as Completed ---
    async function markOrderAsCompleted(orderId) {
      const { data, error } = await supabaseClient
        .from('orders')
        .update({
          order_status: 'selesai',
          updated_at: new Date().toISOString(),
        })
        .eq('id', orderId)
        .eq('order_status', 'siap_diantar')
        .select()
        .single();

      if (error) {
        console.error('Error updating order:', error);
        showToast('Gagal mengupdate status pesanan.', 'error');
        return null;
      }
      return data;
    }

    // --- 7.8 Fetch All Orders (Admin) ---
    async function fetchAllOrders() {
      const { data, error } = await supabaseClient
        .from('orders')
        .select('*, order_items(*), split_bill_participants(*)')
        .order('created_at', { ascending: false });

      if (error) {
        console.error('Error fetching all orders:', error);
        return [];
      }
      return data || [];
    }

    // --- 7.9 Staff Login ---
    async function loginStaff(email, password) {
      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password,
      });

      if (error) {
        console.error('Login error:', error);
        return { session: null, role: null, name: null, error: error.message };
      }

      // Get staff profile (role)
      const { data: profile, error: profileError } = await supabaseClient
        .from('staff_profiles')
        .select('*')
        .eq('id', data.user.id)
        .single();

      if (profileError || !profile) {
        console.error('Profile error:', profileError);
        // Logout if no profile found
        await supabaseClient.auth.signOut();
        return { session: null, role: null, name: null, error: 'Profil pegawai tidak ditemukan.' };
      }

      return {
        session: data.session,
        role: profile.role,
        name: profile.name,
        error: null,
      };
    }

    // --- 7.10 Member Auth ---
    async function registerMember(email, password, name, phone) {
      const { data, error } = await supabaseClient.auth.signUp({
        email,
        password,
      });

      if (error) {
        console.error('Register error:', error);
        return { success: false, error: error.message };
      }
      
      if (data.user) {
        const { error: profileError } = await supabaseClient
          .from('member_profiles')
          .insert({
            id: data.user.id,
            name: name,
            phone: phone || null,
            points: 0
          });
          
        if (profileError) {
          console.error('Profile creation error:', profileError);
          return { success: false, error: 'Gagal membuat profil member.' };
        }
      }

      return { success: true };
    }

    async function loginMember(email, password) {
      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password,
      });

      if (error) {
        console.error('Login error:', error);
        return { session: null, profile: null, error: error.message };
      }

      // Get member profile
      const profile = await fetchMemberProfile(data.user.id);
      
      if (!profile) {
        // If they are staff logging in as member, it will fail and sign out
        await supabaseClient.auth.signOut();
        return { session: null, profile: null, error: 'Akun ini bukan akun member.' };
      }

      return {
        session: data.session,
        profile: profile,
        error: null,
      };
    }

    async function fetchMemberProfile(userId) {
      const { data, error } = await supabaseClient
        .from('member_profiles')
        .select('*')
        .eq('id', userId)
        .single();

      if (error) {
        console.error('Error fetching member profile:', error);
        return null;
      }
      return data;
    }

    async function fetchMemberReservations(memberId) {
      const { data, error } = await supabaseClient
        .from('reservations')
        .select('*')
        .eq('member_id', memberId)
        .order('reservation_date', { ascending: true })
        .order('reservation_time', { ascending: true });

      if (error) {
        console.error('Error fetching reservations:', error);
        return [];
      }
      return data || [];
    }

    async function createReservation(resData) {
      const { data, error } = await supabaseClient
        .from('reservations')
        .insert([resData])
        .select()
        .single();

      if (error) {
        console.error('Error creating reservation:', error);
        return { success: false, error: error.message };
      }
      return { success: true, data };
    }

    // --- 7.11 Logout ---
    async function logoutUser() {
      // Unsubscribe from realtime
      if (ordersChannel) {
        supabaseClient.removeChannel(ordersChannel);
        ordersChannel = null;
      }

      const { error } = await supabaseClient.auth.signOut();
      if (error) {
        console.error('Logout error:', error);
      }
    }

    // --- 7.11 Subscribe to Orders (Realtime) ---
    function subscribeToOrders(callback) {
      // Remove existing channel if any
      if (ordersChannel) {
        supabaseClient.removeChannel(ordersChannel);
      }

      ordersChannel = supabaseClient
        .channel('orders-realtime')
        .on(
          'postgres_changes',
          {
            event: '*',
            schema: 'public',
            table: 'orders',
          },
          (payload) => {
            console.log('Realtime order change:', payload);
            if (callback) callback(payload);
          }
        )
        .on(
          'postgres_changes',
          {
            event: 'INSERT',
            schema: 'public',
            table: 'order_items',
          },
          (payload) => {
            console.log('Realtime order_items change:', payload);
            if (callback) callback(payload);
          }
        )
        .subscribe((status) => {
          console.log('Realtime subscription status:', status);
        });
    }

        title = "Siap Diantar 🚀";
        subtitle = "Pesanan Anda sedang diantar ke meja.";

        `;
      } else if (v === 'verification') {
        const unverifiedOrders = state.orders.filter(o => o.payment_status === 'menunggu_verifikasi');
        
        const verificationCards = unverifiedOrders.map(o => {
          const isSplit = o.is_split_bill;
          let splitHtml = '';
          let actionHtml = '';

          if (isSplit && o.split_bill_participants) {

            splitHtml = `

            actionHtml = `<p class="text-xs text-surface-200 text-center italic">Selesaikan verifikasi semua peserta untuk memproses pesanan.</p>`;

            Verifikasi Pembayaran
          </h2>
          ${unverifiedOrders.length > 0 ? verificationCards : '<div class="glass rounded-xl p-8 text-center border border-white/5"><p class="text-surface-200">Tidak ada pembayaran yang menunggu verifikasi.</p></div>'}
        `;
      } else if (v === 'tables') {
        const tableRows = tablesData.map(t => {
          const statusLabel = t.status === 'tersedia' ? 'Tersedia' : t.status === 'digunakan' ? 'Digunakan' : 'Reserved';
          const statusColor = t.status === 'tersedia' ? 'bg-emerald-500/15 text-emerald-400' : 'bg-red-500/15 text-red-400';
          return `
          <tr class="table-row-hover border-b border-white/5">
            <td class="px-4 py-3 text-sm font-bold text-white">${t.table_number}</td>
            <td class="px-4 py-3 text-sm text-surface-200">${t.capacity} orang</td>
            <td class="px-4 py-3"><span class="px-2 py-0.5 rounded-full text-xs font-semibold ${statusColor}">${statusLabel}</span></td>
            <td class="px-4 py-3 text-xs text-surface-200 truncate max-w-[200px]">${APP_URL}</td>
            <td class="px-4 py-3">
              <button class="admin-qr-btn px-3 py-1.5 rounded-lg bg-magi-500/15 text-magi-300 text-xs font-semibold hover:bg-magi-500/25 transition-colors" data-table="${t.table_number}">QR</button>
            </td>
          </tr>
        `}).join('');
        contentHtml = `
          <h2 class="text-2xl font-black text-white mb-6">Manajemen Meja</h2>
          <div class="glass rounded-2xl border border-white/5 overflow-hidden">
            <div class="overflow-x-auto">
              <table class="w-full">
                <thead>
                  <tr class="border-b border-white/10">
                    <th class="text-left px-4 py-3 text-xs font-bold text-surface-200 uppercase tracking-wider">No. Meja</th>
                    <th class="text-left px-4 py-3 text-xs font-bold text-surface-200 uppercase tracking-wider">Kapasitas</th>
                    <th class="text-left px-4 py-3 text-xs font-bold text-surface-200 uppercase tracking-wider">Status</th>
                    <th class="text-left px-4 py-3 text-xs font-bold text-surface-200 uppercase tracking-wider">QR Link</th>
                    <th class="text-left px-4 py-3 text-xs font-bold text-surface-200 uppercase tracking-wider">Aksi</th>
                  </tr>
                </thead>
                <tbody>${tableRows}</tbody>
              </table>
            </div>
          </div>
        `;
      } else if (v === 'orders') {
        contentHtml = `
          <h2 class="text-2xl font-black text-white mb-6">Daftar Pesanan</h2>
          ${state.orders.length > 0 ? renderOrdersTable(state.orders) : '<div class="glass rounded-xl p-8 text-center border border-white/5"><p class="text-surface-200">Belum ada pesanan.</p></div>'}
        `;
      } else if (v === 'qr') {
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=${encodeURIComponent(APP_URL)}`;
        contentHtml = `
          <h2 class="text-2xl font-black text-white mb-6">Generate QR Code</h2>
          <div class="max-w-md">
            <div class="glass rounded-2xl p-8 text-center border border-white/5">
              <p class="text-sm text-surface-200 mb-5">QR Code umum untuk membuka aplikasi MAGI. Pelanggan akan memilih meja secara manual setelah scan.</p>
              <img src="${qrUrl}" alt="QR Code MAGI" class="mx-auto rounded-xl mb-5 w-60 h-60 bg-white p-2" />
              <p class="text-sm text-magi-300 font-medium mb-4 break-all">${APP_URL}</p>
              <div class="flex gap-3">
                <button id="btn-copy-qr-link" class="flex-1 py-3 rounded-xl bg-magi-500 text-white font-semibold hover:bg-magi-400 transition-colors text-sm flex items-center justify-center gap-2">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
                  Copy Link
                </button>
                <button id="btn-download-qr" class="flex-1 py-3 rounded-xl bg-white/5 border border-white/10 text-white font-semibold hover:bg-white/10 transition-colors text-sm">
                  Download QR

              </div>
            </div>
          </div>

      }

      return `
        ${renderStaffSidebar('admin')}

          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <main class="lg:ml-64 min-h-screen p-4 sm:p-6 lg:p-8 animate-fade-in">
          <div class="max-w-6xl mx-auto">
            ${contentHtml}

        <!-- Modal: QR -->
        <div id="modal-admin-qr" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">

    function renderOrdersTable(orders) {
      const rows = orders.map(o => {
        const createdAt = new Date(o.created_at).toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'short' });
        return `
        <tr class="table-row-hover border-b border-white/5">
          <td class="px-4 py-3 text-sm font-bold text-magi-300">${o.order_code}</td>
          <td class="px-4 py-3 text-sm text-white">Meja ${o.table_number}</td>
          <td class="px-4 py-3 text-sm font-semibold text-accent-light">${formatRupiah(o.total_price)}</td>
          <td class="px-4 py-3 text-sm text-surface-200">${getPaymentLabel(o.payment_method)}</td>
          <td class="px-4 py-3"><span class="px-2 py-0.5 rounded-full text-xs font-semibold ${getStatusClass(o.order_status)}">${getStatusLabel(o.order_status)}</span></td>
          <td class="px-4 py-3 text-xs text-surface-200">${createdAt}</td>
        </tr>
      `}).join('');
      return `
        <div class="glass rounded-2xl border border-white/5 overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead>
                <tr class="border-b border-white/10">
                  <th class="text-left px-4 py-3 text-xs font-bold text-surface-200 uppercase tracking-wider">No. Pesanan</th>
                  <th class="text-left px-4 py-3 text-xs font-bold text-surface-200 uppercase tracking-wider">Meja</th>
                  <th class="text-left px-4 py-3 text-xs font-bold text-surface-200 uppercase tracking-wider">Total</th>
                  <th class="text-left px-4 py-3 text-xs font-bold text-surface-200 uppercase tracking-wider">Pembayaran</th>
                  <th class="text-left px-4 py-3 text-xs font-bold text-surface-200 uppercase tracking-wider">Status</th>
                  <th class="text-left px-4 py-3 text-xs font-bold text-surface-200 uppercase tracking-wider">Waktu</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      `;
    }

    // ----- KITCHEN DASHBOARD -----
    function renderKitchenDashboard() {
      const waitingOrders = state.orders.filter(o => o.order_status === 'menunggu_dimasak');
      const orderCards = waitingOrders.map(o => {
        const items = o.order_items || [];
        const itemsList = items.map(it => `
          <div class="flex justify-between text-sm py-1 border-b border-white/5 last:border-0">
            <span class="text-white">${it.menu_name} <span class="text-surface-200">×${it.quantity}</span></span>
            <span class="text-surface-200">${formatRupiah(it.subtotal)}</span>
          </div>
        `).join('');
        return `
          <div class="glass rounded-2xl p-5 border border-white/5 hover:border-amber-400/20 transition-colors animate-slide-up">
            <div class="flex items-center justify-between mb-3">
              <div>
                <p class="text-xs text-surface-200">Pesanan</p>
                <p class="text-lg font-black text-magi-300">${o.order_code}</p>
              </div>
              <div class="text-right">
                <p class="text-xs text-surface-200">Meja</p>
                <p class="text-2xl font-black text-white">${o.table_number}</p>
              </div>
            </div>
            <div class="mb-3">${itemsList}</div>
            ${o.customer_note ? `<div class="bg-amber-500/10 rounded-lg p-2 mb-3"><p class="text-xs text-amber-300">📝 ${o.customer_note}</p></div>` : ''}
            <div class="flex items-center justify-between mb-4">
              <span class="px-2 py-0.5 rounded-full text-xs font-semibold status-waiting">${getStatusLabel(o.order_status)}</span>
              <span class="text-base font-bold text-accent-light">${formatRupiah(o.total_price)}</span>
            </div>
            <button class="kitchen-done-btn w-full py-3 rounded-xl bg-gradient-to-r from-emerald-500 to-emerald-600 text-white font-bold hover:from-emerald-400 hover:to-emerald-500 transition-all shadow-lg shadow-emerald-500/20" data-order-id="${o.id}">
              ✅ Selesai Dimasak
            </button>
          </div>
        `;
      }).join('');

      return `
        ${renderStaffSidebar('dapur')}
        <button id="btn-toggle-sidebar" class="lg:hidden fixed top-4 left-4 z-40 w-10 h-10 rounded-xl glass flex items-center justify-center hover:bg-white/10 transition-colors">

    // ----- WAITER DASHBOARD -----
    function renderWaiterDashboard() {
      const readyOrders = state.orders.filter(o => o.order_status === 'siap_diantar');
      const orderCards = readyOrders.map(o => {
        const items = o.order_items || [];
        const itemsList = items.map(it => `
          <div class="flex justify-between text-sm py-1 border-b border-white/5 last:border-0">
            <span class="text-white">${it.menu_name} <span class="text-surface-200">×${it.quantity}</span></span>
          </div>
        `).join('');
        return `
          <div class="glass rounded-2xl p-5 border border-white/5 hover:border-emerald-400/20 transition-colors animate-slide-up">
            <div class="flex items-center justify-between mb-3">
              <div>
                <p class="text-xs text-surface-200">Pesanan</p>
                <p class="text-lg font-black text-magi-300">${o.order_code}</p>
              </div>
              <div class="text-right">
                <p class="text-xs text-surface-200">Meja</p>
                <p class="text-2xl font-black text-white">${o.table_number}</p>
              </div>
            </div>
            <div class="mb-3">${itemsList}</div>
            <div class="flex items-center justify-between mb-4">
              <span class="px-2 py-0.5 rounded-full text-xs font-semibold status-ready">${getStatusLabel(o.order_status)}</span>
              <span class="text-base font-bold text-accent-light">${formatRupiah(o.total_price)}</span>
            </div>
            <button class="waiter-done-btn w-full py-3 rounded-xl bg-gradient-to-r from-magi-500 to-magi-600 text-white font-bold hover:from-magi-400 hover:to-magi-500 transition-all shadow-lg shadow-magi-500/20" data-order-id="${o.id}">
              🏁 Pesanan Selesai
            </button>
          </div>
        `;
      }).join('');

      return `
        ${renderStaffSidebar('waiter')}
        <button id="btn-toggle-sidebar" class="lg:hidden fixed top-4 left-4 z-40 w-10 h-10 rounded-xl glass flex items-center justify-center hover:bg-white/10 transition-colors">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <main class="lg:ml-64 min-h-screen p-4 sm:p-6 lg:p-8 animate-fade-in">
          <div class="max-w-6xl mx-auto">
            <div class="flex items-center justify-between mb-6">
              <h2 class="text-2xl font-black text-white">Dashboard Waiter</h2>
              <span class="px-3 py-1 rounded-full text-sm font-bold ${readyOrders.length > 0 ? 'status-ready badge-pulse' : 'bg-white/5 text-surface-200'}">${readyOrders.length} pesanan</span>
            </div>
            ${readyOrders.length > 0 ? `
              <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                ${orderCards}
              </div>
            ` : `
              <div class="glass rounded-2xl p-16 text-center border border-white/5">
                <div class="w-20 h-20 rounded-full bg-white/5 flex items-center justify-center mx-auto mb-4">
                  <svg class="w-10 h-10 text-surface-200/30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                </div>
                <p class="text-lg font-semibold text-white/60 mb-1">Belum ada pesanan</p>
                <p class="text-sm text-surface-200/40">Belum ada pesanan siap diantar.</p>
              </div>
            `}
          </div>
        </main>
      `;
    }

    // ============================================================
    // 10. EVENT HANDLERS
    // ============================================================

    function attachEventListeners() {
      // -- ACCESS SELECT --
      const btnCustomer = document.getElementById('btn-customer');
      if (btnCustomer) btnCustomer.addEventListener('click', async () => {
        state.selectedAccess = 'customer';
        navigate('customer-table-select');
        // Load tables data from Supabase
        if (tablesData.length === 0) {
          await loadTablesData();
          render();
        }
      });

      const btnStaff = document.getElementById('btn-staff');
      if (btnStaff) btnStaff.addEventListener('click', () => {
        state.selectedAccess = 'staff';
        state.loginError = '';
        navigate('staff-login');
      });

      // -- PROMO MEMBER --
      const btnPromoMember = document.getElementById('btn-promo-member');
      if (btnPromoMember) btnPromoMember.addEventListener('click', () => {
        state.loginError = '';
        navigate('member-register');
      });

      // -- MEMBER AUTH BUTTONS --
      const btnGoRegister = document.getElementById('btn-go-register');
      if (btnGoRegister) btnGoRegister.addEventListener('click', () => {
        state.loginError = '';
        navigate('member-register');
      });

      const btnGoLogin = document.getElementById('btn-go-login');
      if (btnGoLogin) btnGoLogin.addEventListener('click', () => {
        state.loginError = '';
        navigate('member-login');
      });

      document.querySelectorAll('#btn-back-access-member, #btn-back-access-member-reg').forEach(btn => {
        btn.addEventListener('click', () => {
          state.loginError = '';
          navigate('access-select');
        });
      });

      const btnMemberRegister = document.getElementById('btn-member-register');
      if (btnMemberRegister) btnMemberRegister.addEventListener('click', async () => {
        const name = document.getElementById('input-reg-name').value;
        const email = document.getElementById('input-reg-email').value;
        const phone = document.getElementById('input-reg-phone').value;
        const password = document.getElementById('input-reg-password').value;

        if (!name || !email || !password) {
          state.loginError = 'Semua field wajib diisi!';
          render();
          return;
        }

        state.isLoading = true; render();
        const res = await registerMember(email, password, name, phone);
        if (res.success) {
          const loginRes = await loginMember(email, password);
          if (loginRes.error) {
            state.loginError = loginRes.error;
            state.isLoading = false; render();
            return;
          }
          state.memberSession = loginRes.session;
          state.memberProfile = loginRes.profile;
          state.isLoading = false;
          showToast('Pendaftaran berhasil! Selamat datang, ' + name, 'success');
          
          if (state.selectedTable) {
            navigate('customer-menu');
            if (menuData.length === 0) { await loadMenuData(); render(); }
          } else {
            navigate('customer-table-select');
            if (tablesData.length === 0) { await loadTablesData(); render(); }
          }
        } else {
          state.loginError = res.error;
          state.isLoading = false; render();
        }
      });

      const btnMemberLogin = document.getElementById('btn-member-login');
      if (btnMemberLogin) btnMemberLogin.addEventListener('click', async () => {
        const email = document.getElementById('input-member-email').value;
        const password = document.getElementById('input-member-password').value;

        if (!email || !password) {
          state.loginError = 'Email dan password wajib diisi!';
          render();
          return;
        }

        state.isLoading = true; render();
        const res = await loginMember(email, password);
        if (res.error) {
          state.loginError = res.error;
          state.isLoading = false; render();
        } else {
          state.memberSession = res.session;
          state.memberProfile = res.profile;
          state.isLoading = false;
          showToast('Berhasil masuk! Selamat datang, ' + res.profile.name, 'success');
          
          if (state.selectedTable) {
            navigate('customer-menu');
            if (menuData.length === 0) { await loadMenuData(); render(); }
          } else {
            navigate('customer-table-select');
            if (tablesData.length === 0) { await loadTablesData(); render(); }
          }
        }
      });

      // -- BACK BUTTONS --
      document.querySelectorAll('#btn-back-access, #btn-back-access-staff').forEach(btn => {
        btn.addEventListener('click', async () => {
          state.selectedAccess = null;
          state.selectedRole = null;
          state.staffName = '';
          state.staffSession = null;
          state.adminSidebarView = 'dashboard';
          state.loginError = '';
          // Logout if logged in
          if (state.staffSession) {
            await logoutStaff();
          }
          navigate('access-select');
        });
      });

      const btnBackTables = document.getElementById('btn-back-tables');
      if (btnBackTables) btnBackTables.addEventListener('click', () => navigate('customer-table-select'));

      document.querySelectorAll('#btn-back-menu, #btn-back-menu-bottom').forEach(btn => {
        btn.addEventListener('click', () => {
          const noteInput = document.getElementById('input-customer-note');
          if (noteInput) state.customerNote = noteInput.value;
          navigate('customer-menu');
        });
      });

      const btnBackCart = document.getElementById('btn-back-cart');
      if (btnBackCart) btnBackCart.addEventListener('click', () => navigate('customer-cart'));

      // -- MEMBER DASHBOARD & RESERVATION --
      const goDashboard = async () => {
        if (!state.memberProfile) return;
        state.isLoading = true; render();
        state.memberReservations = await fetchMemberReservations(state.memberProfile.id);
        state.isLoading = false;
        navigate('member-dashboard');
      };
      
      document.querySelectorAll('#btn-go-dashboard, #btn-go-dashboard-menu').forEach(btn => {
        btn.addEventListener('click', goDashboard);
      });

      const btnBackDashboard = document.getElementById('btn-back-dashboard');
      if (btnBackDashboard) btnBackDashboard.addEventListener('click', () => {
        if (state.selectedTable) {
          navigate('customer-menu');
        } else {
          navigate('customer-table-select');
        }
      });

      const btnMemberLogout = document.getElementById('btn-member-logout');
      if (btnMemberLogout) btnMemberLogout.addEventListener('click', async () => {
        if (!confirm('Yakin ingin keluar?')) return;
        state.isLoading = true; render();
        await logoutUser();
        state.memberSession = null;
        state.memberProfile = null;
        state.memberReservations = [];
        state.usePoints = false;
        state.isLoading = false;
        showToast('Berhasil keluar', 'success');
        navigate('access-select');
      });

      const btnGoReservation = document.getElementById('btn-go-reservation');
      if (btnGoReservation) btnGoReservation.addEventListener('click', () => navigate('member-reservation'));

      const btnGoOrderNow = document.getElementById('btn-go-order-now');
      if (btnGoOrderNow) btnGoOrderNow.addEventListener('click', () => {
        if (state.selectedTable) navigate('customer-menu');
        else navigate('customer-table-select');
      });

      const btnBackReservation = document.getElementById('btn-back-reservation');
      if (btnBackReservation) btnBackReservation.addEventListener('click', () => navigate('member-dashboard'));

      const btnResMinus = document.getElementById('btn-res-minus');
      if (btnResMinus) btnResMinus.addEventListener('click', () => {
        const el = document.getElementById('res-guest-count');
        if (el) {
          let c = parseInt(el.textContent);
          if (c > 1) el.textContent = c - 1;
        }
      });

      const btnResPlus = document.getElementById('btn-res-plus');
      if (btnResPlus) btnResPlus.addEventListener('click', () => {
        const el = document.getElementById('res-guest-count');
        if (el) {
          let c = parseInt(el.textContent);
          if (c < 20) el.textContent = c + 1;
        }
      });

      const btnSubmitReservation = document.getElementById('btn-submit-reservation');
      if (btnSubmitReservation) btnSubmitReservation.addEventListener('click', async () => {
        const rDate = document.getElementById('input-res-date').value;
        const rTime = document.getElementById('input-res-time').value;
        const rGuests = parseInt(document.getElementById('res-guest-count').textContent);
        const rNote = document.getElementById('input-res-note').value;

        if (!rDate || !rTime) {
          showToast('Tanggal dan jam wajib diisi', 'error');
          return;
        }

        state.isLoading = true; render();
        const resData = {
          member_id: state.memberProfile.id,
          reservation_date: rDate,
          reservation_time: rTime,
          guest_count: rGuests,
          special_requests: rNote,
          status: 'menunggu'
        };

        const res = await createReservation(resData);
        if (!res.success) {
          showToast('Gagal membuat reservasi: ' + res.error, 'error');
          state.isLoading = false; render();
        } else {
          showToast('Reservasi berhasil dibuat! Menunggu konfirmasi admin.', 'success');
          state.isLoading = false;
          // Reload dashboard
          goDashboard();
        }
      });

      // -- TABLE SELECT --
      document.querySelectorAll('.table-select-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.selectedTable = parseInt(btn.dataset.table);
          render();
        });
      });

      const btnContinueMenu = document.getElementById('btn-continue-menu');
      if (btnContinueMenu) btnContinueMenu.addEventListener('click', async () => {
        if (!state.selectedTable) {
          showToast('Silakan pilih meja terlebih dahulu.', 'error');
          return;
        }
        navigate('customer-menu');
        // Load menu data from Supabase
        if (menuData.length === 0) {
          await loadMenuData();
          render();
        }
      });

      // -- MENU --
      document.querySelectorAll('.menu-cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.menuFilter = btn.dataset.cat;
          render();
        });
      });

      document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const menu = menuData.find(m => m.id === btn.dataset.id);
          if (menu) {
            addToCart(menu);
            showToast(`${menu.name} ditambahkan ke keranjang!`, 'success');
          }
        });
      });

      document.querySelectorAll('.cart-plus-btn').forEach(btn => {
        btn.addEventListener('click', () => updateCartQuantity(btn.dataset.id, 1));
      });

      document.querySelectorAll('.cart-minus-btn').forEach(btn => {
        btn.addEventListener('click', () => updateCartQuantity(btn.dataset.id, -1));
      });

      // -- GO TO CART --
      document.querySelectorAll('#btn-go-cart, #btn-go-cart-header').forEach(btn => {
        btn.addEventListener('click', () => navigate('customer-cart'));
      });

      // -- GO TO MY ORDER --
      const btnMyOrder = document.getElementById('btn-my-order');
      if (btnMyOrder) btnMyOrder.addEventListener('click', () => {
        navigate('customer-success');
      });

      // -- CUSTOMER NOTE INPUT --
      const noteInput = document.getElementById('input-customer-note');
      if (noteInput) {
        noteInput.addEventListener('input', (e) => {
          state.customerNote = e.target.value;
        });
      }

      // -- GO TO CHECKOUT --
      const btnGoCheckout = document.getElementById('btn-go-checkout');
      if (btnGoCheckout) btnGoCheckout.addEventListener('click', () => {
        const noteI = document.getElementById('input-customer-note');
        if (noteI) state.customerNote = noteI.value;
        navigate('customer-checkout');
      });

      // -- PAYMENT METHODS --
      document.querySelectorAll('.payment-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.selectedPaymentMethod = btn.dataset.method;
          render();
        });
      });

      // -- USE POINTS --
      const togglePoints = document.getElementById('toggle-points');
      if (togglePoints) togglePoints.addEventListener('change', () => {
        state.usePoints = togglePoints.checked;
        render();
      });

      // -- SPLIT BILL --
      const toggleSplit = document.getElementById('toggle-split');
      if (toggleSplit) toggleSplit.addEventListener('change', () => {
        state.splitBillEnabled = toggleSplit.checked;
        render();
      });

      const splitMinus = document.getElementById('split-minus');
      if (splitMinus) splitMinus.addEventListener('click', () => {
        if (state.splitCount > 2) { state.splitCount--; render(); }
      });

      const splitPlus = document.getElementById('split-plus');
      if (splitPlus) splitPlus.addEventListener('click', () => {
        state.splitCount++;
        render();
      });

      const btnAddParticipant = document.getElementById('btn-add-participant');
      if (btnAddParticipant) btnAddParticipant.addEventListener('click', () => {
        const input = document.getElementById('input-participant');
        if (!input || !input.value.trim()) {
          showToast('Masukkan nama peserta!', 'error');
          return;
        }
        state.splitParticipants.push({ name: input.value.trim(), status: 'Belum Bayar' });
        render();
        showToast(`${input.value.trim()} ditambahkan ke Split Bill`, 'success');
      });

      // -- Split QR Modal --
      const btnGenSplitQr = document.getElementById('btn-gen-split-qr');
      if (btnGenSplitQr) btnGenSplitQr.addEventListener('click', () => {
        const modal = document.getElementById('modal-split-qr');
        if (modal) modal.classList.remove('hidden');
      });

      const btnCloseSplitQr = document.getElementById('btn-close-split-qr');
      if (btnCloseSplitQr) btnCloseSplitQr.addEventListener('click', () => {
        const modal = document.getElementById('modal-split-qr');
        if (modal) modal.classList.add('hidden');
      });

      // -- Scan Friend QR --
      const btnScanFriend = document.getElementById('btn-scan-friend-qr');
      if (btnScanFriend) btnScanFriend.addEventListener('click', () => {
        const modal = document.getElementById('modal-scan-friend');
        if (modal) modal.classList.remove('hidden');
      });

      const btnCloseScanFriend = document.getElementById('btn-close-scan-friend');
      if (btnCloseScanFriend) btnCloseScanFriend.addEventListener('click', () => {
        const modal = document.getElementById('modal-scan-friend');
        if (modal) modal.classList.add('hidden');
      });

      // -- PAY NOW (Create Order in Supabase) --
      const btnPayNow = document.getElementById('btn-pay-now');
      if (btnPayNow) btnPayNow.addEventListener('click', async () => {
        if (state.cart.length === 0) {
          showToast('Keranjang kosong!', 'error');
          return;
        }
        if (!state.selectedPaymentMethod) {
          showToast('Pilih metode pembayaran terlebih dahulu.', 'error');
          return;
        }

        state.isLoading = true;
        render();

        // Map payment method to database value
        const dbPaymentMethod = PAYMENT_METHOD_MAP[state.selectedPaymentMethod] || state.selectedPaymentMethod;
        const isQris = dbPaymentMethod === 'qris';

        const pointsUsed = getUsedPoints();
        // Base points earned on subtotal so using points doesn't lower earned points
        const pointsEarned = state.memberProfile ? Math.floor(getCartSubtotal() / 1000) : 0;

        const orderData = {
          orderCode: generateOrderCode(),
          tableNumber: state.selectedTable,
          customerNote: state.customerNote,
          totalPrice: getCartTotal(),
          paymentMethod: dbPaymentMethod,
          paymentStatus: isQris ? 'menunggu_verifikasi' : 'dummy_paid',
          orderStatus: isQris ? 'menunggu_verifikasi_pembayaran' : 'menunggu_dimasak',
          paymentAmount: getPayableAmount(),
          isSplitBill: state.splitBillEnabled,
          splitAmount: getSplitAmount(),
          splitParticipants: state.splitParticipants,
          memberId: state.memberProfile ? state.memberProfile.id : null,
          pointsUsed: pointsUsed,
          pointsEarned: pointsEarned
        };

        const order = await createOrder(orderData, state.cart);

        state.isLoading = false;

        if (order) {
          state.lastOrderInfo = order;
          state.cart = [];
          state.customerNote = '';
          state.selectedPaymentMethod = null;
          state.splitBillEnabled = false;
          state.splitParticipants = [];
          state.splitCount = 2;
          saveLocalState();
          showToast('Pesanan berhasil dibuat! 🎉', 'success');
          
          // Subscribe customer to real-time updates for tracking
          subscribeToOrders((payload) => {
            if (payload.new && state.lastOrderInfo && payload.new.id === state.lastOrderInfo.id) {
              state.lastOrderInfo = { ...state.lastOrderInfo, ...payload.new };
              saveLocalState();
              if (state.currentView === 'customer-success') render();
            }
          });

          navigate('customer-success');
        } else {
          render();
        }
      });

      // -- ORDER AGAIN --
      const btnOrderAgain = document.getElementById('btn-order-again');
      if (btnOrderAgain) btnOrderAgain.addEventListener('click', () => {
        state.cart = [];
        state.menuFilter = 'Semua';
        navigate('customer-menu');
      });

      // -- STAFF LOGIN (Supabase Auth) --
      const btnStaffLogin = document.getElementById('btn-staff-login');
      if (btnStaffLogin) btnStaffLogin.addEventListener('click', async () => {
        const emailInput = document.getElementById('input-staff-email');
        const passwordInput = document.getElementById('input-staff-password');

        const email = emailInput ? emailInput.value.trim() : '';
        const password = passwordInput ? passwordInput.value : '';

        if (!email) {
          state.loginError = 'Masukkan email pegawai.';
          render();
          return;
        }
        if (!password) {
          state.loginError = 'Masukkan password.';
          render();
          return;
        }

        state.isLoading = true;
        state.loginError = '';
        render();

        const result = await loginStaff(email, password);

        state.isLoading = false;

        if (result.error) {
          state.loginError = result.error;
          render();
          return;
        }

        state.staffSession = result.session;
        state.selectedRole = result.role;
        state.staffName = result.name;
        state.adminSidebarView = 'dashboard';

        // Load initial data
        await loadTablesData();
        await loadDashboardOrders();

        // Start realtime subscription
        subscribeToOrders(async (payload) => {
          if (state.currentView.includes('dashboard')) {
            await loadDashboardOrders();
            render();
          }
        });

        showToast(`Selamat datang, ${result.name}!`, 'success');

        if (state.selectedRole === 'admin') navigate('admin-dashboard');
        else if (state.selectedRole === 'dapur') navigate('kitchen-dashboard');
        else if (state.selectedRole === 'waiter') navigate('waiter-dashboard');
      });

      // Allow Enter key to submit login
      const passwordInput = document.getElementById('input-staff-password');
      if (passwordInput) {
        passwordInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            const loginBtn = document.getElementById('btn-staff-login');
            if (loginBtn) loginBtn.click();
          }
        });
      }

      // -- STAFF SIDEBAR NAV --
      document.querySelectorAll('.sidebar-nav-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          state.adminSidebarView = btn.dataset.view;
          // Refresh data when switching views
          if (btn.dataset.view === 'orders' || btn.dataset.view === 'dashboard') {
            await loadDashboardOrders();
          }
          render();
        });
      });

      // -- STAFF LOGOUT --
      const btnLogout = document.getElementById('btn-staff-logout');
      if (btnLogout) btnLogout.addEventListener('click', async () => {
        await logoutUser();
        state.selectedAccess = null;
        state.selectedRole = null;
        state.staffName = '';
        state.staffSession = null;
        state.adminSidebarView = 'dashboard';
        state.orders = [];
        navigate('access-select');
        showToast('Berhasil logout.', 'info');
      });

      // -- ADMIN QR BUTTONS --
      document.querySelectorAll('.admin-qr-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const tableNum = btn.dataset.table;
          const specificUrl = `${APP_URL}?table=${tableNum}`;
          
          document.getElementById('modal-qr-title').innerText = `QR Code Meja ${tableNum}`;
          document.getElementById('modal-qr-desc').innerText = `Scan QR ini untuk langsung memesan dari Meja ${tableNum}.`;
          document.getElementById('modal-qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=${encodeURIComponent(specificUrl)}`;
          document.getElementById('modal-qr-url').innerText = specificUrl;
          document.getElementById('btn-modal-copy-link').dataset.url = specificUrl;
          
          const modal = document.getElementById('modal-admin-qr');
          if (modal) modal.classList.remove('hidden');
        });
      });

      const btnModalCloseQr = document.getElementById('btn-modal-close-qr');
      if (btnModalCloseQr) btnModalCloseQr.addEventListener('click', () => {
        const modal = document.getElementById('modal-admin-qr');
        if (modal) modal.classList.add('hidden');
      });

      // -- COPY LINK --
      document.querySelectorAll('#btn-copy-qr-link, #btn-modal-copy-link').forEach(btn => {
        btn.addEventListener('click', () => {
          const urlToCopy = btn.dataset.url || APP_URL;
          navigator.clipboard.writeText(urlToCopy).then(() => {
            showToast('Link berhasil disalin!', 'success');
          }).catch(() => {
            const ta = document.createElement('textarea');
            ta.value = urlToCopy;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            ta.remove();
            showToast('Link berhasil disalin!', 'success');
          });
        });
      });

      // -- DOWNLOAD QR (admin) --
      const btnDownloadQr = document.getElementById('btn-download-qr');
      if (btnDownloadQr) btnDownloadQr.addEventListener('click', () => {
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=${encodeURIComponent(APP_URL)}`;
        window.open(qrUrl, '_blank');
      });

      // -- KITCHEN: DONE COOKING (Supabase update) --
      document.querySelectorAll('.kitchen-done-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const orderId = btn.dataset.orderId;
          btn.disabled = true;
          btn.textContent = '⏳ Memproses...';

          const updated = await markOrderAsCooked(orderId);
          if (updated) {
            showToast(`Pesanan ${updated.order_code} siap diantar!`, 'success');
            await loadDashboardOrders();
            render();
          } else {
            btn.disabled = false;
            btn.textContent = '✅ Selesai Dimasak';
          }
        });
      });

      // -- WAITER: ORDER DONE (Supabase update) --
      document.querySelectorAll('.waiter-done-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const orderId = btn.dataset.orderId;
          btn.disabled = true;
          btn.textContent = '⏳ Memproses...';

          const updated = await markOrderAsCompleted(orderId);
          if (updated) {
            showToast(`Pesanan ${updated.order_code} selesai!`, 'success');
            await loadDashboardOrders();
            render();
          } else {
            btn.disabled = false;
            btn.textContent = '🏁 Pesanan Selesai';
          }
        });
      });

      // -- MOBILE SIDEBAR TOGGLE --
      const btnToggle = document.getElementById('btn-toggle-sidebar');
      const sidebar = document.getElementById('staff-sidebar');
      if (btnToggle && sidebar) {
        if (!sidebar.classList.contains('translate-x-0') && window.innerWidth < 1024) {
          sidebar.classList.add('-translate-x-full');
        }
        btnToggle.addEventListener('click', () => {
          sidebar.classList.toggle('-translate-x-full');
          sidebar.classList.toggle('translate-x-0');
        });
      }

      // Close modals on overlay click
      document.querySelectorAll('.modal-overlay').forEach(modal => {
        modal.addEventListener('click', (e) => {
          if (e.target === modal) modal.classList.add('hidden');
        });
      });
    }

    // ============================================================
    // GLOBAL ADMIN ACTIONS
    // ============================================================
    window.verifyPayment = async function(orderId) {
      if (!confirm('Verifikasi pembayaran pesanan ini? Pesanan akan diteruskan ke dapur.')) return;
      
      state.isLoading = true; render();
      
      const order = state.orders.find(o => o.id === orderId);

      const { error } = await supabaseClient
        .from('orders')
        .update({ 
          payment_status: 'paid',
          order_status: 'menunggu_dimasak'
        })
        .eq('id', orderId);
        
      if (error) {
        showToast('Gagal memverifikasi: ' + error.message, 'error');
      } else {
        showToast('Pembayaran berhasil diverifikasi', 'success');
        
        // Update member points if applicable
        if (order && order.member_id) {
          const { data: profile } = await supabaseClient
            .from('member_profiles')
            .select('points')
            .eq('id', order.member_id)
            .single();
            
          if (profile) {
            const newPoints = profile.points - (order.points_used || 0) + (order.points_earned || 0);
            await supabaseClient
              .from('member_profiles')
              .update({ points: newPoints })
              .eq('id', order.member_id);
          }
        }
      }
      
      state.isLoading = false; render();
    };

    window.rejectPayment = async function(orderId) {
      if (!confirm('Tolak pembayaran pesanan ini? Pesanan akan dibatalkan.')) return;
      
      state.isLoading = true; render();
      
      const { error } = await supabaseClient
        .from('orders')
        .update({ 
          payment_status: 'failed',
          order_status: 'dibatalkan'
        })
        .eq('id', orderId);
        
      if (error) showToast('Gagal menolak: ' + error.message, 'error');
      else showToast('Pembayaran ditolak', 'success');
      
      state.isLoading = false; render();
    };

    window.verifySplitParticipant = async function(participantId, orderId) {
      state.isLoading = true; render();
      
      // Update participant
      const { error } = await supabaseClient
        .from('split_bill_participants')
        .update({ payment_status: 'terverifikasi' })
        .eq('id', participantId);
        
      if (error) {
        showToast('Gagal memverifikasi peserta: ' + error.message, 'error');
        state.isLoading = false; render();
        return;
      }
      
      // Check if all are verified
      const { data: participants } = await supabaseClient
        .from('split_bill_participants')
        .select('payment_status')
        .eq('order_id', orderId);
        
      const allVerified = participants && participants.every(p => p.payment_status === 'terverifikasi');
      
      if (allVerified) {
        // Auto verify order
        await supabaseClient
          .from('orders')
          .update({ 
            payment_status: 'paid',
            order_status: 'menunggu_dimasak'
          })
          .eq('id', orderId);
        showToast('Semua peserta terverifikasi. Pesanan diteruskan ke dapur!', 'success');

        const order = state.orders.find(o => o.id === orderId);
        if (order && order.member_id) {
          const { data: profile } = await supabaseClient
            .from('member_profiles')
            .select('points')
            .eq('id', order.member_id)
            .single();
            
          if (profile) {
            const newPoints = profile.points - (order.points_used || 0) + (order.points_earned || 0);
            await supabaseClient
              .from('member_profiles')
              .update({ points: newPoints })
              .eq('id', order.member_id);
          }
        }
      } else {
        showToast('Peserta terverifikasi', 'success');
      }
      
      state.isLoading = false; render();
    };

    window.rejectSplitParticipant = async function(participantId, orderId) {
      if (!confirm('Tolak pembayaran peserta ini?')) return;
      
      state.isLoading = true; render();
      
      const { error } = await supabaseClient
        .from('split_bill_participants')
        .update({ payment_status: 'ditolak' })
        .eq('id', participantId);
        
      if (error) showToast('Gagal menolak peserta: ' + error.message, 'error');
      else showToast('Pembayaran peserta ditolak', 'success');
      
      state.isLoading = false; render();
    };

    // ============================================================
    // 11. INITIALIZATION
    // ============================================================

    loadLocalState();

    // Check for QR Code auto-routing parameter ?table=X
    const urlParams = new URLSearchParams(window.location.search);
    const tableParam = urlParams.get('table');
    if (tableParam && !isNaN(parseInt(tableParam))) {
      state.selectedAccess = 'customer';
      state.selectedTable = parseInt(tableParam);
      
      // Clean up URL so refresh doesn't force re-route if they navigated away
      window.history.replaceState({}, document.title, window.location.pathname);
      
      // Temporarily set view to loading
      state.currentView = 'customer-table-select'; 
      loadMenuData().then(() => {
        state.currentView = 'customer-menu';
        render();
      });
    }
    
    // Auto-subscribe customer to real-time updates if they have an active order
    if (state.lastOrderInfo && state.currentView && state.currentView.startsWith('customer')) {
      subscribeToOrders((payload) => {
        if (payload.new && state.lastOrderInfo && payload.new.id === state.lastOrderInfo.id) {
          state.lastOrderInfo = { ...state.lastOrderInfo, ...payload.new };
          saveLocalState();
          if (state.currentView === 'customer-success') render();
        }
      });
    }

    render();
  </script>
</body>
</html>
